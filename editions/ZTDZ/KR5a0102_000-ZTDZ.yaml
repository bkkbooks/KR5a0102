body:
  text: 太上昇玄消災護命妙經註元始天尊說太古經註太上昇玄消災護命妙經註清庵瑩蟾子李道純註爾時元始天尊元始謂元始祖氣也元始祖氣化生諸天即釋教所謂无上道不動尊故曰天尊在七寳林中人之一身三元四象具足故謂之七寳林五明宫内即中宫黃庭内境虛明普照故曰五明宮與无極聖衆俱謂種種變化也放无極光明謂種種知見也照无極世界謂種種境界也觀无極衆生謂種種幻妄也受无極苦惱謂種種纏縛也宛轉世間翻軀換殻無有了期輪迴生死岀生入死不自知覺漂浪愛河愛河浪濶漂蕩者情縁之故流吹慾海慾海波深沉溺者貪著之故也沉滯聲色色聲所眩謂之業識迷惑有無有無所遷謂之根塵無空有空無空不是空有空即幻空無色有色無色不是色有色是幻色無無有無無無不是無有無即幻無有有無有有有不是有無有即幻有終始暗昧纔著一邊便是昧了也不能自明不著一邊到底不明畢竟迷惑四者惑亂終身不定右一章開示說經之義一切有情皆住有無色空差別境界是故天尊垂慈演說是經設種種方便蓋欲使人假此幻身而修正覺故有七寳五明之喻若欲玉符保神金液鍊形必先存乎元始祖氣而後檢攝種種因縁始能破一切差别離一切境界斷一切幻安解一切纏縳是以不爲受慾苦惱而永無輪轉也作是見者長生久視之道得矣天尊告曰重宣此義爾等衆生一切衆生皆由幻生從不有中有一切有相本不有不無中無一切無相本不無不色中色一切色相本不色不空中空一切空相本不空非有爲有著有爲有非有也非無爲無著無爲無非無也非色爲色見色爲色非色也非空爲空迷空爲空非空也空即是空空即空頑空也空無定空空豈有定體色即是色色即色幻色也色無定色色豈有定體即色是空色不異於空即空是色空不異於色若能知空不空不空之空是謂真空知色不色不色之色是謂真色名爲照了照了色空則一了達有無不二始達妙音聞無所聞謂之妙音識無空法空無所空謂之空法洞觀無礙有無不二無礙之門入衆妙門色空如一衆妙之門自然解悟不著有無心性豁達離諸疑網不見色空疑團粉碎不著空見無眼界乃至無意識界清淨六根無色聲香味觸法斷除邪障無色無受想行識右二章此章發明昇玄之心法也天尊慈憫之故直指有無色空的的旨趣叮嚀告戒返復再四蓋欲使人離諸差別境界不住有無空見昇玄造微之要至是盡矣修真髙士若向這裹具隻眼叅學事畢其或未然諦聽末後句我故爲汝說是妙經解義如前名曰護命長生久視之道濟度衆生信之者不遭濁辱隨身供養存於内形存壽永傳教世間施於外利益人天流通讀誦誦之者捍厄扶衰即有飛天神王破邪金剛護法靈童救苦真人金精猛獸各百億萬衆俱侍衛是經隨所擁護是經所在之處即得十天善神擁護即佛經所謂是經所在之處如佛塔廟之義也捍厄扶衰是謂延生之藥石度一切衆生是謂濟度之津梁離諸染著是謂洗塵之法雨爾時天尊即說偈曰重宣妙義視不見我戒愼乎其所不賭聽不得聞恐懼乎其所不聞離種種邊故君子常愼其獨名爲妙道昇玄之道至是盡矣右三章誘喻持經之功德也前說有無色空四趣真趣作昇玄之階級濟度之津梁惟恐力不及者承當不去又於是章假立種種法相接引中人以下敬信奉持俾之誦言求意漸入佳境又作四句偈言直指玄要直欲使其人與非人俱昇玄境之意也以此見太上好生之徳可謂至矣若非篤志力行者不足以報玄恩經間庵者更宜勉之太上昇玄消災護命妙經註終
